<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 워크플로우 분석 & 자동화 구체화 도구 - HANLIM PHARM.</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:linear-gradient(135deg,#f0f4f8,#e2e8f0); min-height:100vh; padding:20px; color:#1a202c; }
  .wrap { max-width:960px; margin:0 auto; }

  /* 헤더 */
  .header { background:linear-gradient(135deg,#1e3a5f,#2d5a8e); color:#fff; border-radius:16px 16px 0 0; padding:24px 32px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .header .left { display:flex; flex-direction:column; gap:4px; }
  .header .title-row { display:flex; align-items:center; gap:10px; }
  .header .ai-badge { background:rgba(255,255,255,0.2); padding:2px 10px; border-radius:6px; font-size:13px; font-weight:600; }
  .header h1 { font-size:20px; font-weight:700; }
  .header .sub { font-size:12px; opacity:0.7; }
  .header .date { font-size:13px; opacity:0.8; }

  /* 진행바 */
  .progress-bar { background:#fff; padding:16px 32px; border-bottom:1px solid #e2e8f0; display:flex; gap:4px; align-items:center; }
  .phase-item { flex:1; display:flex; align-items:center; gap:4px; }
  .phase-btn { display:flex; align-items:center; gap:6px; cursor:default; transition:opacity 0.3s; background:none; border:none; font-family:inherit; }
  .phase-btn.clickable { cursor:pointer; }
  .phase-btn.inactive { opacity:0.4; }
  .phase-circle { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; transition:all 0.3s; flex-shrink:0; }
  .phase-circle.done { background:#38a169; color:#fff; }
  .phase-circle.active { background:#1e3a5f; color:#fff; }
  .phase-circle.pending { background:#e2e8f0; color:#a0aec0; }
  .phase-label { font-size:12px; white-space:nowrap; }
  .phase-label.active { font-weight:700; color:#1e3a5f; }
  .phase-label.other { font-weight:500; color:#718096; }
  .phase-line { flex:1; height:2px; margin:0 4px; border-radius:1px; transition:background 0.3s; }
  .phase-line.done { background:#38a169; }
  .phase-line.pending { background:#e2e8f0; }

  /* 본문 */
  .body { background:#f7fafc; padding:28px 32px; min-height:500px; }

  /* 카드 */
  .card { background:#fff; border-radius:12px; border:1.5px solid #e2e8f0; padding:20px; margin-bottom:16px; }
  .card.bottleneck-active { border-color:#e53e3e; border-width:2px; }

  /* 입력 */
  .inp { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s; }
  .inp:focus { border-color:#2d5a8e; box-shadow:0 0 0 3px rgba(45,90,142,0.1); }
  .txa { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px; font-family:inherit; outline:none; min-height:80px; resize:vertical; line-height:1.7; transition:border-color 0.2s; }
  .txa:focus { border-color:#2d5a8e; box-shadow:0 0 0 3px rgba(45,90,142,0.1); }
  label { display:block; font-size:12px; font-weight:600; color:#718096; margin-bottom:6px; }
  .label-sm { font-size:11px; font-weight:600; color:#718096; margin-bottom:4px; }

  /* 가이드 */
  .guide { background:#fffbeb; border-left:4px solid #f6ad55; padding:14px 18px; border-radius:0 8px 8px 0; font-size:13px; color:#744210; line-height:1.7; margin-bottom:20px; }
  .guide-green { background:#f0fff4; border-left:4px solid #38a169; padding:14px 18px; border-radius:0 8px 8px 0; font-size:13px; color:#276749; line-height:1.7; margin-bottom:20px; }

  /* 그리드 */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; text-align:center; }
  .step-row { display:grid; grid-template-columns:60px 1fr 1fr 1fr; gap:12px; align-items:start; }
  .tobe-row { display:grid; grid-template-columns:1fr 40px 1fr; gap:12px; align-items:start; }

  /* 뱃지 */
  .step-badge { background:#edf2f7; color:#4a5568; font-size:12px; font-weight:700; padding:4px 10px; border-radius:12px; display:inline-block; }

  /* 플로우 */
  .flow-row { display:flex; align-items:center; gap:4px; margin-bottom:20px; overflow-x:auto; padding:8px 0; flex-wrap:wrap; }
  .flow-chip { background:#1e3a5f; color:#fff; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap; max-width:160px; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
  .flow-arrow { color:#a0aec0; font-size:18px; flex-shrink:0; }

  /* 병목 버튼 */
  .bottleneck-btn { padding:6px 16px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .bottleneck-btn.off { border:1.5px solid #cbd5e0; background:#fff; color:#718096; }
  .bottleneck-btn.on { border:2px solid #e53e3e; background:#fff5f5; color:#e53e3e; }

  /* 점수 버튼 */
  .score-btn { flex:1; padding:6px 0; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .score-btn.off { border:1px solid #e2e8f0; background:#fff; color:#718096; }
  .score-btn.on { border:2px solid #2d5a8e; background:#ebf4ff; color:#2d5a8e; }

  /* 추가 버튼 */
  .add-btn { display:flex; align-items:center; gap:6px; padding:10px 20px; background:none; border:1.5px dashed #cbd5e0; border-radius:8px; color:#718096; font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .add-btn:hover { border-color:#2d5a8e; color:#2d5a8e; background:#f7fafc; }

  /* As-Is / To-Be */
  .asis-box { background:#fff5f5; padding:10px 14px; border-radius:8px; font-size:13px; color:#742a2a; border:1px solid #fed7d7; }
  .tobe-inp { background:#f0fff4; border-color:#c6f6d5; }

  /* 요약 박스 */
  .summary-box { background:linear-gradient(135deg,#ebf4ff,#f0f7ff); border:1.5px solid #90cdf4; border-radius:12px; padding:20px; }
  .summary-num { font-size:24px; font-weight:800; }
  .summary-lbl { font-size:11px; color:#718096; }

  /* 하단 */
  .footer { background:#fff; border-radius:0 0 16px 16px; padding:16px 32px; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .footer-brand { font-size:13px; font-weight:700; color:#1e3a5f; }
  .footer-sub { font-size:10px; color:#a0aec0; }
  .btn-group { display:flex; gap:10px; flex-wrap:wrap; }

  .btn { padding:10px 24px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
  .btn-prev { border:none; background:#edf2f7; color:#4a5568; }
  .btn-prev:hover { background:#e2e8f0; }
  .btn-next { border:none; background:linear-gradient(135deg,#1e3a5f,#2d5a8e); color:#fff; }
  .btn-next:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(30,58,95,0.3); }
  .btn-reset { border:1.5px solid #e53e3e; background:#fff; color:#e53e3e; }
  .btn-reset:hover { background:#fff5f5; }
  .btn-pdf { border:1.5px solid #1e3a5f; background:#fff; color:#1e3a5f; }
  .btn-pdf:hover { background:#f7fafc; }
  .btn-submit { border:none; background:linear-gradient(135deg,#1e3a5f,#2d5a8e); color:#fff; }
  .btn-disabled { opacity:0.5; cursor:not-allowed !important; transform:none !important; box-shadow:none !important; }

  /* 토스트 */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); padding:14px 28px; border-radius:10px; font-size:14px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.15); z-index:1000; pointer-events:none; opacity:0; transition:all 0.4s ease; color:#fff; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.ok { background:#1e3a5f; }
  .toast.err { background:#e53e3e; }

  /* 성공 화면 */
  .success-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; justify-content:center; align-items:center; }
  .success-overlay.show { display:flex; }
  .success-card { background:#fff; border-radius:16px; padding:48px; text-align:center; max-width:440px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.12); animation:popIn 0.3s ease; }
  @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }

  /* 레이더 차트 영역 */
  .radar-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; min-width:160px; }

  @media(max-width:768px) {
    body { padding:10px; }
    .header { padding:20px 18px; flex-direction:column; align-items:flex-start; }
    .body { padding:20px 18px; }
    .footer { padding:16px 18px; }
    .progress-bar { padding:12px 18px; overflow-x:auto; }
    .grid-2 { grid-template-columns:1fr; }
    .step-row { grid-template-columns:1fr; }
    .tobe-row { grid-template-columns:1fr; }
    .grid-4 { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <!-- 헤더 -->
  <div class="header">
    <div class="left">
      <div class="title-row">
        <span class="ai-badge">AI</span>
        <h1>워크플로우 분석 & 자동화 구체화 도구</h1>
      </div>
      <p class="sub">전사 AI 경쟁력 기반 확립 프로젝트 2026 · HANLIM PHARM.</p>
    </div>
    <div class="date" id="dateDisplay"></div>
  </div>

  <!-- 진행바 -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- 본문 -->
  <div class="body" id="mainBody"></div>

  <!-- 하단 -->
  <div class="footer">
    <div>
      <div class="footer-brand">HANLIM PHARM.</div>
      <div class="footer-sub">전사 AI 경쟁력 기반 확립 프로젝트 2026</div>
    </div>
    <div class="btn-group" id="footerBtns"></div>
  </div>
</div>

<!-- 성공 오버레이 -->
<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div style="font-size:56px;margin-bottom:16px;">🎉</div>
    <h2 style="font-size:22px;color:#1e3a5f;margin-bottom:10px;">제출이 완료되었습니다!</h2>
    <p style="font-size:14px;color:#718096;line-height:1.8;margin-bottom:28px;">워크플로우 분석 및 자동화 실행 계획이<br>성공적으로 저장되었습니다.</p>
    <div class="btn-group" style="justify-content:center;">
      <button class="btn btn-pdf" onclick="generatePDF()">📄 PDF 저장</button>
      <button class="btn btn-next" onclick="newForm()">새로 작성하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 상태 ==========
const PHASES = ["기본 정보","프로세스 매핑","병목 분석 & 타당성 평가","To-Be 설계 & 실행 계획"];
const ICONS = ["📋","🔄","🔍","🚀"];
const CRITERIA = [
  {key:"frequency",label:"업무 빈도 및 반복성",desc:"얼마나 자주 반복되는가?",low:"분기별/비정기",high:"매일/매시간 반복"},
  {key:"complexity",label:"기술적 복잡성",desc:"표준화·규칙 기반인가?",low:"비정형/예외 많음",high:"표준 입력/명확 기준"},
  {key:"value",label:"비즈니스 가치",desc:"비용 절감·오류 감소 효과는?",low:"편의성 향상 위주",high:"ROI 명확/효과 큼"},
  {key:"data",label:"데이터 구조화 수준",desc:"디지털로 정제되어 있는가?",low:"종이/파편화 심함",high:"클라우드/ERP 정제"},
  {key:"risk",label:"규제 리스크",desc:"SOP 내 자동화 가능한가?",low:"고위험 임상 결정",high:"SOP 내 자동화 가능"},
];

let phase = 0;
let info = {dept:"",position:"",author:"",title:""};
let steps = [];
let toBe = {vision:"",humanLoop:"",timeline:"",kpi:""};
let toBeSteps = [];
let APPS_SCRIPT_URL = "";

function initSteps(){
  steps = [];
  for(let i=1;i<=5;i++) steps.push({id:i,task:"",system:"",pain:"",isBottleneck:false,score:{}});
}
initSteps();

// URL 파라미터
(function(){
  const p = new URLSearchParams(location.search);
  const ep = p.get("endpoint");
  if(ep) APPS_SCRIPT_URL = ep;
})();

// 날짜
const now = new Date();
document.getElementById("dateDisplay").textContent = `작성일: ${now.getFullYear()}. ${String(now.getMonth()+1).padStart(2,"0")}. ${String(now.getDate()).padStart(2,"0")}.`;

// ========== 유틸 ==========
function $(id){return document.getElementById(id);}
function showToast(msg,isErr){
  const t=$("toast"); t.textContent=msg; t.className="toast show "+(isErr?"err":"ok");
  setTimeout(()=>t.className="toast",3000);
}
function getFilledSteps(){return steps.filter(s=>s.task.trim());}
function getBottlenecks(){return steps.filter(s=>s.isBottleneck&&s.task.trim());}
function getAvg(s){const v=CRITERIA.map(c=>s.score[c.key]||0);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;}
function scoreColor(v){return v>=80?"#38a169":v>=40?"#d69e2e":"#e53e3e";}
function scoreLabel(v){return v>=80?"고타당성":v>=40?"검토 필요":"비권장";}

// ========== 렌더 ==========
function render(){
  renderProgress();
  renderBody();
  renderFooter();
}

function renderProgress(){
  let h="";
  PHASES.forEach((label,i)=>{
    const done=i<phase, active=i===phase, clickable=i<phase;
    h+=`<div class="phase-item">`;
    h+=`<button class="phase-btn ${clickable?"clickable":""} ${!done&&!active?"inactive":""}" onclick="${clickable?`goPhase(${i})`:""}" ${!clickable?"disabled":""}">`;
    h+=`<div class="phase-circle ${done?"done":active?"active":"pending"}">${done?"✓":ICONS[i]}</div>`;
    h+=`<span class="phase-label ${active?"active":"other"}">${label}</span>`;
    h+=`</button>`;
    if(i<PHASES.length-1) h+=`<div class="phase-line ${done?"done":"pending"}"></div>`;
    h+=`</div>`;
  });
  $("progressBar").innerHTML=h;
}

function renderBody(){
  const el=$("mainBody");
  if(phase===0) el.innerHTML=renderPhase0();
  else if(phase===1) el.innerHTML=renderPhase1();
  else if(phase===2) el.innerHTML=renderPhase2();
  else el.innerHTML=renderPhase3();
}

// Phase 0
function renderPhase0(){
  return `
    <div class="card">
      <h3 style="font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:16px;">📋 기본 정보 입력</h3>
      <div class="grid-2">
        <div><label>소속 부서 *</label><input class="inp" value="${esc(info.dept)}" oninput="info.dept=this.value" placeholder="예: 영업기획팀"></div>
        <div><label>직급 / 직책</label><input class="inp" value="${esc(info.position)}" oninput="info.position=this.value" placeholder="예: 책임 / 팀장"></div>
        <div><label>작성자 *</label><input class="inp" value="${esc(info.author)}" oninput="info.author=this.value" placeholder="성명"></div>
        <div><label>분석 대상 업무</label><input class="inp" value="${esc(info.title)}" oninput="info.title=this.value" placeholder="예: 지역별 처방 데이터 분석 및 목표 설정"></div>
      </div>
    </div>
    <div class="guide">💡 이 도구는 <strong>프로세스 매핑 → 병목 식별 → 타당성 평가 → To-Be 설계</strong> 순서로 진행됩니다. 현재 업무를 단계별로 입력하면, 자동화 타당성을 점수로 평가하고 실행 계획까지 구체화할 수 있습니다.</div>`;
}

// Phase 1
function renderPhase1(){
  const filled = getFilledSteps();
  let flowH = "";
  if(filled.length===0) flowH=`<span style="font-size:13px;color:#a0aec0;">단계를 입력하면 여기에 프로세스 흐름이 표시됩니다</span>`;
  else filled.forEach((s,i)=>{
    flowH+=`<span class="flow-chip">${esc(s.task)}</span>`;
    if(i<filled.length-1) flowH+=`<span class="flow-arrow">→</span>`;
  });

  let stepsH="";
  steps.forEach((s,i)=>{
    stepsH+=`
    <div class="card step-row">
      <div style="text-align:center;padding-top:8px;"><span class="step-badge">Step ${i+1}</span></div>
      <div><div class="label-sm">업무 내용</div><input class="inp" value="${esc(s.task)}" oninput="updStep(${s.id},'task',this.value)" placeholder="이 단계에서 하는 일"></div>
      <div><div class="label-sm">사용 자료 · 시스템</div><input class="inp" value="${esc(s.system)}" oninput="updStep(${s.id},'system',this.value)" placeholder="Excel, SAP, 이메일 등"></div>
      <div><div class="label-sm">불편 · 반복 포인트</div><input class="inp" value="${esc(s.pain)}" oninput="updStep(${s.id},'pain',this.value)" placeholder="수동 입력, 오류 발생 등"></div>
    </div>`;
  });

  return `
    <div class="guide">💡 현재 업무가 수행되는 순서대로 각 단계를 입력하세요. 업무 내용·사용 시스템·불편/반복 포인트를 구체적으로 기록할수록 병목 분석에 도움됩니다.</div>
    ${info.title?`<div style="font-size:15px;font-weight:700;color:#1e3a5f;margin-bottom:16px;">🔄 「${esc(info.title)}」 프로세스 매핑</div>`:""}
    <div class="flow-row">${flowH}</div>
    ${stepsH}
    <button class="add-btn" onclick="addStep()">+ 단계 추가</button>`;
}

// Phase 2
function renderPhase2(){
  const filled=getFilledSteps();
  let h=`<div class="guide">💡 각 단계에서 <strong>병목 지점</strong>을 선택한 뒤, 5가지 평가 지표로 <strong>자동화 타당성</strong>을 점수화하세요. 80점 이상이면 고타당성, 40~80점이면 검토 필요입니다.</div>`;

  filled.forEach((s,i)=>{
    const avg=getAvg(s), col=scoreColor(avg);
    h+=`<div class="card ${s.isBottleneck?"bottleneck-active":""}">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px;">`;
    h+=`<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span class="step-badge">Step ${i+1}</span><span style="font-size:15px;font-weight:700;color:#1e3a5f;">${esc(s.task)}</span></div>`;
    if(s.pain) h+=`<span style="font-size:12px;color:#e53e3e;">⚠️ ${esc(s.pain)}</span>`;
    h+=`</div>`;
    h+=`<button class="bottleneck-btn ${s.isBottleneck?"on":"off"}" onclick="toggleBN(${s.id})">${s.isBottleneck?"🔴 병목 지점":"병목 지점 지정"}</button>`;
    h+=`</div>`;

    if(s.isBottleneck){
      h+=`<div style="display:flex;gap:20px;flex-wrap:wrap;">`;
      h+=`<div style="flex:1;min-width:280px;">`;
      CRITERIA.forEach(c=>{
        h+=`<div style="margin-bottom:12px;">`;

function renderRadar(scores){
  const size=140,cx=70,cy=70,r=50,n=CRITERIA.length;
  const pts=CRITERIA.map((_,i)=>{const a=Math.PI*2*i/n-Math.PI/2;const v=(scores[CRITERIA[i].key]||0)/100;return{x:cx+r*v*Math.cos(a),y:cy+r*v*Math.sin(a)};});
  const outline=CRITERIA.map((_,i)=>{const a=Math.PI*2*i/n-Math.PI/2;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};});
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  svg+=`<polygon points="${outline.map(p=>p.x+","+p.y).join(" ")}" fill="none" stroke="#cbd5e0" stroke-width="1"/>`;
  [0.25,0.5,0.75].forEach(s=>{
    svg+=`<polygon points="${CRITERIA.map((_,i)=>{const a=Math.PI*2*i/n-Math.PI/2;return(cx+r*s*Math.cos(a))+","+(cy+r*s*Math.sin(a));}).join(" ")}" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>`;
  });
  svg+=`<polygon points="${pts.map(p=>p.x+","+p.y).join(" ")}" fill="rgba(45,90,142,0.15)" stroke="#2d5a8e" stroke-width="1.5"/>`;
  pts.forEach(p=>{svg+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#2d5a8e"/>`;});
  svg+=`</svg>`;
  return svg;
}

function renderFooter(){
  let h="";
  if(phase>0) h+=`<button class="btn btn-prev" onclick="goPhase(${phase-1})">← 이전</button>`;
  if(phase===3){
    h+=`<button class="btn btn-reset" onclick="resetForm()">🔄 초기화</button>`;
    h+=`<button class="btn btn-next" onclick="generatePDF()" style="gap:6px;">📄 PDF 저장 & 제출</button>`;
  }
  if(phase<3) h+=`<button class="btn btn-next" onclick="goPhase(${phase+1})">다음 →</button>`;
  $("footerBtns").innerHTML=h;
}

// ========== 액션 ==========
function goPhase(p){phase=p;render();window.scrollTo({top:0,behavior:"smooth"});}
function updStep(id,f,v){const s=steps.find(x=>x.id===id);if(s)s[f]=v;renderBody();}
function toggleBN(id){const s=steps.find(x=>x.id===id);if(s){s.isBottleneck=!s.isBottleneck;render();}}
function setScore(id,key,val){const s=steps.find(x=>x.id===id);if(s){s.score[key]=val;render();}}
function addStep(){steps.push({id:steps.length+1,task:"",system:"",pain:"",isBottleneck:false,score:{}});render();}
function updToBe(id,f,v){const t=toBeSteps.find(x=>x.id===id);if(t)t[f]=v;}

function resetForm(){
  if(!confirm("작성 내용을 모두 초기화하시겠습니까?"))return;
  phase=0; info={dept:"",position:"",author:"",title:""}; initSteps();

  render(); showToast("🔄 초기화되었습니다.");
}

function newForm(){
  $("successOverlay").classList.remove("show");
  phase=0; info={dept:"",position:"",author:"",title:""}; initSteps();
  toBe={vision:"",humanLoop:"",timeline:"",kpi:""}; toBeSteps=[];
  render();
}

function collectSubmitData(){
  return {
    submittedAt:new Date().toLocaleString("ko-KR"),...info,
    requirement:toBe.vision, enduser:info.dept+" 소속",
    asis:getFilledSteps().map(s=>`Step${s.id}: ${s.task}`).join(" → "),
    tobe:toBeSteps.map(s=>`${s.original} → ${s.aiSolution} (${s.tool})`).join(" / "),
    steps:getFilledSteps().map((s,i)=>({step:i+1,task:s.task,system:s.system,pain:s.pain,isBottleneck:s.isBottleneck,avgScore:getAvg(s)})),
    humanLoop:toBe.humanLoop, timeline:toBe.timeline, kpi:toBe.kpi
  };
}

async function submitToSheet(){
  if(!APPS_SCRIPT_URL) return false;
  try{
    // form 방식으로 전송 (no-cors에서도 body가 정상 전달됨)
    const formData = new FormData();
    formData.append("payload", JSON.stringify(collectSubmitData()));
    await fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:formData});
    return true;
  }catch(e){console.error("Sheet submit error:",e);return false;}
}

async function submitForm(){
  if(!info.dept.trim()||!info.author.trim()){showToast("부서와 작성자를 입력해 주세요.",true);return;}
  const btn=document.querySelector(".btn-submit");
  btn.classList.add("btn-disabled"); btn.textContent="제출 중...";
  const ok = await submitToSheet();
  if(ok) $("successOverlay").classList.add("show");
  else showToast("❌ 제출 중 오류가 발생했습니다.",true);
  btn.classList.remove("btn-disabled"); btn.innerHTML="📤 제출하기";
}

  </div>
  <div style="padding:16px 36px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:11px;color:#a0aec0;"><span>HANLIM PHARM. · 전사 AI 경쟁력 기반 확립 프로젝트 2026</span><span>생성일: ${dateStr}</span></div>
  </body></html>`;

  // iframe 방식 (팝업 차단 없음)
  let iframe = document.getElementById("printFrame");
  if(!iframe){iframe=document.createElement("iframe");iframe.id="printFrame";iframe.style.cssText="position:fixed;width:0;height:0;border:none;left:-9999px;";document.body.appendChild(iframe);}
  const doc=iframe.contentDocument||iframe.contentWindow.document;
  doc.open();doc.write(html);doc.close();
  setTimeout(()=>{iframe.contentWindow.focus();iframe.contentWindow.print();},600);

  // Google Sheets에도 동시 제출
  if(APPS_SCRIPT_URL){
    submitToSheet().then(ok=>{
      if(ok) showToast("✅ PDF 저장 + Google Sheets 제출 완료!");
      else showToast("⚠️ PDF는 저장되었으나 시트 제출에 실패했습니다.",true);
    });
  }
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// 초기 렌더
render();
